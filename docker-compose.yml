# Golden Starter — run both frontend and backend with:
#   cp .env.example .env   # then fill in your keys
#   docker-compose up --build

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - FRONTEND_ORIGIN=http://localhost:3000

# Optional: enable Qdrant for vector search later.
# Uncomment below and set QDRANT_URL=http://qdrant:6333 in .env for the api service.
#
#   qdrant:
#     image: qdrant/qdrant:latest
#     ports:
#       - "6333:6333"
#     volumes:
#       - qdrant_storage:/qdrant/storage
#
# volumes:
#   qdrant_storage:
